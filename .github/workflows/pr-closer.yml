name: pr-closer

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight
  workflow_dispatch:

concurrency:
  group: pr-closer
  cancel-in-progress: true

jobs:
  pr-closer:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      checks: read
      statuses: read
    steps:
      - uses: jdx/pr-closer@v1
